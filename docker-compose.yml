services:
  # Nginx reverse proxy gateway
  nginx-gateway:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy-common.conf:/etc/nginx/proxy-common.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/www/certbot:/var/www/certbot:ro
      - ./nginx/logs:/var/log/nginx
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
    networks:
      - shared_gateway_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # ACME client (acme.sh) — SSL cert via DNS-01 challenge
  acme:
    image: neilpang/acme.sh
    container_name: acme
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./acme-data:/acme.sh
      - ./acme/dns-env.sh:/dns-env.sh:ro
      - ./acme/wrapper.sh:/wrapper.sh:ro
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
      - DNS_PROVIDER=${DNS_PROVIDER}
      - DNS_API_USER=${DNS_API_USER}
      - DNS_API_KEY=${DNS_API_KEY}
    entrypoint: /wrapper.sh
    restart: unless-stopped

  # FRP Server — reverse proxy for exposing local services behind NAT
  frps:
    image: snowdreamtech/frps
    container_name: frps
    network_mode: host
    volumes:
      - ./frp/frps.toml:/etc/frp/frps.toml:ro
    # ports:
    #   - "${FRPS_BIND_PORT}:${FRPS_BIND_PORT}"
    #   - "${FRPS_VHOST_HTTP_PORT}:${FRPS_VHOST_HTTP_PORT}"
    #   - "${FRPS_VHOST_HTTPS_PORT}:${FRPS_VHOST_HTTPS_PORT}"
    # networks:
    #   - shared_gateway_net
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
    restart: unless-stopped

networks:
  shared_gateway_net:
    external: true
